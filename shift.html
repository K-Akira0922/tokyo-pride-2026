<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Pride 2026 – シフト表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0d0d14; --surface: #16161f; --surface2: #1e1e2e;
    --text: #f0f0f8; --dim: #888899; --accent: #FF6E40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .rainbow-bar {
    height: 4px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100;
    background: linear-gradient(90deg,#FF3A5C,#FF8C00,#FFD700,#4CAF50,#2196F3,#9C27B0);
  }
  header { margin-top: 4px; padding: 10px 18px 8px; border-bottom: 1px solid #ffffff10; }
  header h1 {
    font-size: 11px; font-family: 'Space Mono',monospace;
    color: var(--dim); text-transform: uppercase; letter-spacing:.1em;
  }
  header h1 span {
    display:block; font-size:15px; color:var(--text);
    font-family:'Noto Sans JP',sans-serif; margin-top:2px; font-weight:700;
  }

  .scene { padding: 12px 14px 28px; max-width: 720px; margin: 0 auto; }

  .tabs {
    display: flex; gap: 0; margin-bottom: 12px;
    border: 1px solid #ffffff15; border-radius: 9px; overflow: hidden;
  }
  .tab-btn {
    flex: 1; padding: 10px 0; font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif; border: none; cursor: pointer;
    background: none; color: var(--dim); transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; pointer-events: none; }
  .tab-btn:not(.active):hover { background: #ffffff0f; color: var(--text); }

  .shift-wrap { display: none; flex-direction: column; gap: 8px; }
  .shift-wrap.visible { display: flex; }

  .shift-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--dim); font-family: 'Space Mono', monospace;
    flex-wrap: wrap; gap: 8px;
  }
  .btn-open {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 7px;
    background: rgba(255,110,64,.14); border: 1px solid rgba(255,110,64,.35);
    color: var(--accent); font-size: 11px; font-weight: 700;
    text-decoration: none; transition: all .2s; white-space: nowrap;
  }
  .btn-open:hover { background: rgba(255,110,64,.24); }

  /* 画像コンテナ：横スクロール＋ピンチ拡大 */
  .img-scroll {
    width: 100%; overflow-x: auto; overflow-y: hidden;
    background: #fff; border-radius: 10px;
    border: 1px solid #ffffff12;
    -webkit-overflow-scrolling: touch;
  }
  .shift-img {
    display: block;
    /* スマホでも文字が読める最低幅を確保 */
    min-width: 900px;
    width: 100%;
    height: auto;
  }

  .hint-bar {
    font-size: 10px; color: var(--dim); font-family: 'Space Mono', monospace;
    text-align: center; padding: 5px 0;
  }

  .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .nav-link {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 12px; border-radius: 8px; text-decoration: none;
    background: #ffffff09; border: 1px solid #ffffff12;
    color: var(--text); font-size: 11px; font-weight: 700; transition: all .2s;
  }
  .nav-link:hover { background: #ffffff16; transform: translateY(-1px); }
</style>
</head>
<body>
<div class="rainbow-bar"></div>

<header>
  <h1>Tokyo Pride 2026 / Operations<span>📋 ボランティア シフト表</span></h1>
</header>

<div class="scene">

  <div class="tabs">
    <button class="tab-btn active" id="btn-0606" onclick="switchTab('0606')">6月6日（土）</button>
    <button class="tab-btn"        id="btn-0607" onclick="switchTab('0607')">6月7日（日）</button>
  </div>

  <!-- 6/6 -->
  <div class="shift-wrap visible" id="wrap-0606">
    <div class="shift-meta">
      <span>統括サポート / 6月6日（土）</span>
      <a class="btn-open" href="shift_0606.png" target="_blank">↗ 別タブで開く</a>
    </div>
    <div class="img-scroll">
      <img class="shift-img" src="shift_0606.png" alt="シフト表 6月6日">
    </div>
    <div class="hint-bar">← 横スクロール・ピンチアウトで拡大 →</div>
  </div>

  <!-- 6/7 -->
  <div class="shift-wrap" id="wrap-0607">
    <div class="shift-meta">
      <span>統括サポート / 6月7日（日）</span>
      <a class="btn-open" href="shift_0607.png" target="_blank">↗ 別タブで開く</a>
    </div>
    <div class="img-scroll">
      <img class="shift-img" src="shift_0607.png" alt="シフト表 6月7日">
    </div>
    <div class="hint-bar">← 横スクロール・ピンチアウトで拡大 →</div>
  </div>

  <div class="nav-links">
    <a class="nav-link" href="index.html">← トップに戻る</a>
    <a class="nav-link" href="timeline.html">📅 スケジュール</a>
  </div>

</div>

<script>
function switchTab(day) {
  ['0606','0607'].forEach(d => {
    document.getElementById('btn-'  + d).className = 'tab-btn' + (d === day ? ' active' : '');
    document.getElementById('wrap-' + d).className = 'shift-wrap' + (d === day ? ' visible' : '');
  });
}
</script>
</body>
</html>
