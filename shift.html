<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Pride 2026 – シフト表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0d0d14; --surface: #16161f; --surface2: #1e1e2e;
    --text: #f0f0f8; --dim: #888899;
    --accent: #FF6E40; --blue: #5BC0EB; --gold: #FFD93D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .rainbow-bar {
    height: 4px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100;
    background: linear-gradient(90deg,#FF3A5C,#FF8C00,#FFD700,#4CAF50,#2196F3,#9C27B0);
  }
  header { margin-top: 4px; padding: 10px 18px 8px; border-bottom: 1px solid #ffffff10; }
  header h1 {
    font-size: 11px; font-family: 'Space Mono',monospace;
    color: var(--dim); text-transform: uppercase; letter-spacing:.1em;
  }
  header h1 span {
    display:block; font-size:15px; color:var(--text);
    font-family:'Noto Sans JP',sans-serif; margin-top:2px; font-weight:700;
  }

  .scene { padding: 12px 14px 28px; max-width: 720px; margin: 0 auto; }

  .tabs {
    display: flex; gap: 0; margin-bottom: 12px;
    border: 1px solid #ffffff15; border-radius: 9px; overflow: hidden;
  }
  .tab-btn {
    flex: 1; padding: 10px 0; font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif; border: none; cursor: pointer;
    background: none; color: var(--dim); transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; pointer-events: none; }
  .tab-btn:not(.active):hover { background: #ffffff0f; color: var(--text); }

  .pdf-wrap { display: none; flex-direction: column; gap: 10px; }
  .pdf-wrap.visible { display: flex; }

  .pdf-meta {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--dim); font-family: 'Space Mono', monospace;
    flex-wrap: wrap; gap: 8px;
  }
  .btn-open {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 7px;
    background: rgba(255,110,64,.14); border: 1px solid rgba(255,110,64,.35);
    color: var(--accent); font-size: 11px; font-weight: 700;
    text-decoration: none; transition: all .2s; white-space: nowrap;
  }
  .btn-open:hover { background: rgba(255,110,64,.24); }

  .canvas-wrap {
    width: 100%; overflow-x: auto; overflow-y: hidden;
    background: #fff; border-radius: 10px;
    border: 1px solid #ffffff12;
  }
  .pdf-canvas {
    display: block;
    /* 幅はJSで設定 */
  }

  .pdf-loading {
    padding: 32px 16px; text-align: center;
    font-size: 11px; color: var(--dim); font-family: 'Space Mono', monospace;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .dp { display: flex; gap: 4px; }
  .dp span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pu 1.2s ease infinite; }
  .dp span:nth-child(2) { animation-delay:.2s; }
  .dp span:nth-child(3) { animation-delay:.4s; }
  @keyframes pu { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  .pdf-error {
    padding: 20px 16px; text-align: center;
    font-size: 11px; color: var(--accent); font-family: 'Space Mono', monospace;
  }

  .hint-bar {
    font-size: 10px; color: var(--dim); font-family: 'Space Mono', monospace;
    text-align: center; padding: 6px 0;
  }

  .nav-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .nav-link {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 12px; border-radius: 8px; text-decoration: none;
    background: #ffffff09; border: 1px solid #ffffff12;
    color: var(--text); font-size: 11px; font-weight: 700; transition: all .2s;
  }
  .nav-link:hover { background: #ffffff16; transform: translateY(-1px); }
</style>
</head>
<body>
<div class="rainbow-bar"></div>

<header>
  <h1>Tokyo Pride 2026 / Operations<span>📋 ボランティア シフト表</span></h1>
</header>

<div class="scene">

  <div class="tabs">
    <button class="tab-btn active" id="btn-0606" onclick="switchTab('0606')">6月6日（土）</button>
    <button class="tab-btn"        id="btn-0607" onclick="switchTab('0607')">6月7日（日）</button>
  </div>

  <!-- 6/6 -->
  <div class="pdf-wrap visible" id="wrap-0606">
    <div class="pdf-meta">
      <span>統括サポート / 6月6日（土）</span>
      <a class="btn-open" href="Tokyopride2026ボラ統サポート_シフト_0606_.pdf" target="_blank">↗ 別タブで開く</a>
    </div>
    <div class="canvas-wrap" id="canvas-wrap-0606">
      <div class="pdf-loading" id="loading-0606">
        <div class="dp"><span></span><span></span><span></span></div>読み込み中...
      </div>
    </div>
    <div class="hint-bar">← 横スクロール・ピンチアウトで拡大できます →</div>
  </div>

  <!-- 6/7 -->
  <div class="pdf-wrap" id="wrap-0607">
    <div class="pdf-meta">
      <span>統括サポート / 6月7日（日）</span>
      <a class="btn-open" href="Tokyopride2026ボラ統サポート_シフト_0607_.pdf" target="_blank">↗ 別タブで開く</a>
    </div>
    <div class="canvas-wrap" id="canvas-wrap-0607">
      <div class="pdf-loading" id="loading-0607">
        <div class="dp"><span></span><span></span><span></span></div>読み込み中...
      </div>
    </div>
    <div class="hint-bar">← 横スクロール・ピンチアウトで拡大できます →</div>
  </div>

  <div class="nav-links">
    <a class="nav-link" href="index.html">← トップに戻る</a>
    <a class="nav-link" href="timeline.html">📅 スケジュール</a>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const FILES = {
  '0606': 'Tokyopride2026ボラ統サポート_シフト_0606_.pdf',
  '0607': 'Tokyopride2026ボラ統サポート_シフト_0607_.pdf',
};
const rendered = { '0606': false, '0607': false };

async function renderPDF(day) {
  if (rendered[day]) return;
  rendered[day] = true;

  const wrap    = document.getElementById('canvas-wrap-' + day);
  const loading = document.getElementById('loading-' + day);

  try {
    const pdf = await pdfjsLib.getDocument(FILES[day]).promise;

    // 全ページを縦に並べる
    for (let i = 1; i <= pdf.numPages; i++) {
      const page     = await pdf.getPage(i);
      // 画面幅に合わせてスケール計算（最低900px確保）
      const vp0      = page.getViewport({ scale: 1 });
      const viewW    = Math.max(window.innerWidth - 28, 900);
      const scale    = viewW / vp0.width;
      const viewport = page.getViewport({ scale });

      const canvas  = document.createElement('canvas');
      canvas.className = 'pdf-canvas';
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width  = viewport.width  + 'px';
      canvas.style.height = viewport.height + 'px';

      if (i === 1) loading.remove();
      wrap.appendChild(canvas);

      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }
  } catch (e) {
    loading.innerHTML = `<div class="pdf-error">⚠ 読み込みに失敗しました。<br>「別タブで開く」からご確認ください。</div>`;
  }
}

function switchTab(day) {
  ['0606','0607'].forEach(d => {
    document.getElementById('btn-'  + d).className = 'tab-btn' + (d === day ? ' active' : '');
    document.getElementById('wrap-' + d).className = 'pdf-wrap' + (d === day ? ' visible' : '');
  });
  renderPDF(day);
}

// 初期表示
renderPDF('0606');
</script>
</body>
</html>
